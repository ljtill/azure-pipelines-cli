name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so advisories published after a quiet period are caught.
    - cron: "0 7 * * 1"

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    # Advisory ignores are reviewed in .cargo/audit.toml and mirrored in
    # deny.toml with rationale, review date, and review-by date.
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    # deny.toml owns license/source policy and must keep advisory ignores in
    # sync with .cargo/audit.toml before releases.
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
