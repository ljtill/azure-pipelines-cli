name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (auto derives from conventional commits)"
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto
      draft:
        description: "Create as draft release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  models: read

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: pipelines

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.calc.outputs.version }}
      tag: ${{ steps.calc.outputs.tag }}
      changelog: ${{ steps.notes.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          # Find latest semver tag, default to 0.0.0 if none exist
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            COMMIT_RANGE="HEAD"
          else
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
          fi
          echo "Latest tag: $LATEST_TAG"

          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          BUMP="${{ inputs.bump }}"
          if [ "$BUMP" = "auto" ]; then
            # Parse conventional commits to determine bump type
            COMMITS=$(git log "$COMMIT_RANGE" --pretty=format:"%s" 2>/dev/null || true)

            if echo "$COMMITS" | grep -qE '^[a-z]+(\(.+\))?!:|BREAKING CHANGE:'; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE '^feat(\(.+\))?:'; then
              BUMP="minor"
            else
              BUMP="patch"
            fi
            echo "Auto-detected bump: $BUMP"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "${{ steps.calc.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.calc.outputs.tag }} already exists"
            exit 1
          fi

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            COMMIT_RANGE="HEAD"
          else
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
          fi

          COMMIT_LOG=$(git log "$COMMIT_RANGE" --pretty=format:"- %s" 2>/dev/null || true)
          if [ -z "$COMMIT_LOG" ]; then
            echo "No notable changes." > release-notes.md
            echo "changelog=release-notes.md" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Try AI-generated release notes via GitHub Models
          echo "Attempting AI-generated release notes..."
          if ! gh extension list | grep -q gh-models; then
            echo "Installing gh-models extension..."
            gh extension install github/gh-models || echo "::warning::gh-models extension install failed"
          fi

          PROMPT="You are a release notes writer for an open-source CLI tool called azure-pipelines-cli (a TUI dashboard for Azure DevOps Pipelines).

          Given the following git commit messages (using Conventional Commits format), generate clean, polished release notes in Markdown.

          Rules:
          - Group changes under these headings (only include sections that have entries): 🚀 Features, 🐛 Bug Fixes, ♻️ Refactoring, 📖 Documentation, 🔧 CI & Maintenance
          - Flag any breaking changes with a ⚠️ BREAKING CHANGE callout
          - Write concise, user-friendly descriptions (not raw commit messages)
          - Do not include commit hashes or author names
          - Output only the Markdown, no preamble

          Commits:
          ${COMMIT_LOG}"

          if echo "$PROMPT" | gh models run openai/gpt-4.1-mini > ai-notes.md 2>ai-notes-err.txt && [ -s ai-notes.md ]; then
            echo "AI release notes generated successfully"
            cp ai-notes.md release-notes.md
          else
            echo "::warning::AI generation failed: $(cat ai-notes-err.txt 2>/dev/null)"
            echo "Falling back to conventional commit parsing"

            # Shell-based fallback: group commits by type
            FEATURES=""
            FIXES=""
            PERF=""
            REFACTORS=""
            DOCS=""
            CI_CHORES=""
            OTHER=""

            while IFS= read -r MSG; do
              [ -z "$MSG" ] && continue
              BREAKING=""
              if echo "$MSG" | grep -qE '^[a-z]+(\(.+\))?!:'; then
                BREAKING=" **BREAKING**"
              fi
              DESC=$(echo "$MSG" | sed -E 's/^[a-z]+(\([^)]*\))?!?:\s*//')
              case "$MSG" in
                feat*)     FEATURES="${FEATURES}- ${DESC}${BREAKING}\n" ;;
                fix*)      FIXES="${FIXES}- ${DESC}${BREAKING}\n" ;;
                perf*)     PERF="${PERF}- ${DESC}${BREAKING}\n" ;;
                refactor*) REFACTORS="${REFACTORS}- ${DESC}${BREAKING}\n" ;;
                docs*)     DOCS="${DOCS}- ${DESC}${BREAKING}\n" ;;
                ci*|chore*|build*|test*|style*) CI_CHORES="${CI_CHORES}- ${DESC}${BREAKING}\n" ;;
                *)         OTHER="${OTHER}- ${DESC}${BREAKING}\n" ;;
              esac
            done <<< "$(git log "$COMMIT_RANGE" --pretty=format:"%s" 2>/dev/null)"

            CHANGELOG=""
            [ -n "$FEATURES" ]  && CHANGELOG="${CHANGELOG}## 🚀 Features\n\n${FEATURES}\n"
            [ -n "$FIXES" ]     && CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes\n\n${FIXES}\n"
            [ -n "$PERF" ]      && CHANGELOG="${CHANGELOG}## ⚡ Performance\n\n${PERF}\n"
            [ -n "$REFACTORS" ] && CHANGELOG="${CHANGELOG}## ♻️ Refactoring\n\n${REFACTORS}\n"
            [ -n "$DOCS" ]      && CHANGELOG="${CHANGELOG}## 📖 Documentation\n\n${DOCS}\n"
            [ -n "$CI_CHORES" ] && CHANGELOG="${CHANGELOG}## 🔧 CI & Maintenance\n\n${CI_CHORES}\n"
            [ -n "$OTHER" ]     && CHANGELOG="${CHANGELOG}## Other\n\n${OTHER}\n"

            if [ -z "$CHANGELOG" ]; then
              CHANGELOG="No notable changes."
            fi

            echo -e "$CHANGELOG" > release-notes.md
          fi

          echo "--- Release Notes ---"
          cat release-notes.md
          echo "changelog=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Upload release notes
        uses: actions/upload-artifact@v6
        with:
          name: release-notes
          path: release-notes.md

  build:
    name: Build (${{ matrix.target }})
    needs: version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: pipelines-linux-amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: pipelines-linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: pipelines-darwin-amd64
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: pipelines-darwin-arm64
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: pipelines-windows-amd64.exe
            cross: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-release-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh release create "${{ needs.version.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --notes-file artifacts/release-notes.md \
            $DRAFT_FLAG \
            artifacts/pipelines-*
